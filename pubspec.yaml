name: grocer_ph
description: "A new Flutter project."
 
publish_to: 'none'  
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'



# -------------- PACKAGES -------------- #

dependencies:
  flutter:
    sdk: flutter
  
  # Utility Packages
  http: ^1.6.0
  intl: ^0.20.2
  logger: ^2.7.0
  lottie: ^3.3.3
  url_launcher: ^6.3.2
  connectivity_plus: ^7.1.1
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.7.3
  get_storage: ^2.1.1

  # Product Specific
  readmore: ^3.0.0

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.2

# -------------- ./ PACKAGES END -------------- #



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true



# -------------- LOCAL ASSETS -------------- #
  assets:
    - assets/logos/
    - assets/images/
    - assets/images/on_boarding_images/
    - assets/animations/


# -------------- LOCAL FONTS -------------- #
  fonts:
    - family: Poppins
      fonts:
      - asset: assets\fonts\poppins_light_300.ttf
        weight: 300
      - asset: assets\fonts\poppins_regular_400.ttf
        weight: 400
      - asset: assets\fonts\poppins_italic_400.ttf
        style: italic
      - asset: assets\fonts\poppins_medium_500.ttf
        weight: 500
      - asset: assets\fonts\poppins_medium_italic_500.ttf
        weight: 500
        style: italic
      - asset: assets\fonts\poppins_semibold_600.ttf
        weight: 600
      - asset: assets\fonts\poppins_bold_700.ttf
        weight: 800